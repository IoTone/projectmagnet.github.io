# Project MagNET landing page
# Note: Template blocks require a 'weight' parameter so they're correctly ordered on the landing page

# Hero
hero:
  enable: true
  weight: 10
  template: hero

  backgroundImage:
    path: "images/templates/hero"
    filename:
      desktop: "gradient-desktop.webp"
      mobile: "gradient-mobile.webp"

  badge:
    text: v0.1.0 · local-first IoT
    color: primary # primary, secondary, success, danger, warning, info, light, dark
    pill: false # boolean
    soft: true # boolean

  title: "Project MagNET"
  subtitle: An **open, local-first** platform for IoT data and **hyperlocal, hive-centric AI**. Discover, provision, control, and sync your devices — **without** proprietary clouds, and on **your** terms for data and security.

  ctaButton:
    icon: rocket_launch
    btnText: "Read the Docs"
    url: "/docs/"
  cta2Button:
    icon: code
    btnText: "View on GitHub"
    url: "https://github.com/IoTone/ProjectMagNET"

  info: "**Open Source** — Apache 2.0 Licensed."

# Feature Grid
featureGrid:
  enable: true
  weight: 20
  template: feature grid

  title: What is Project MagNET?
  subtitle: A constellation of cooperating edge devices — phones, wearables, sensors, and microcontrollers — that organize themselves, share data locally, and run intelligence at the edge. Every device is a cell in a larger, hyperlocal nervous system.

  items:
    - title: Local-First
      icon: cloud_off
      description: Your data stays where you are. MagNET captures and syncs IoT data on your own subnet — local or in a cloud you control — so you avoid lock-in to proprietary services.
      ctaLink:
        text: learn more
        url: /docs/

    - title: Hive-Centric AI
      icon: hive
      description: Devices self-organize into a hive under a ruler, hot-swap roles over the air, and share memory. Not every device needs to be a brain — each acts as a cell, neuron, or synapse in a swarm.
      ctaLink:
        text: explore Hive AI
        url: /docs/hive-ai/

    - title: Hyperlocal Context
      icon: my_location
      description: Awareness scoped to here and now — locations, sightings, and a transaction model for advertising and offloading compute and AI between nearby devices.
      ctaLink:
        text: learn more
        url: /docs/

    - title: Every Device, a Cloud
      icon: cloud
      description: Any device can serve a cloud of services, discoverable over BLE or Wi-Fi. Detect, connect, provision, control, and collect — the five things a MagNET node should always be able to do.
      ctaLink:
        text: learn more
        url: /docs/

    - title: You Own Your Data
      icon: lock
      description: Security on by default — secure transport and verified session-key exchange. It's up to each node to decide how much it trusts a given data sink.
      ctaLink:
        text: learn more
        url: /docs/

    - title: Reference Designs
      icon: developer_board
      description: Working firmware for ESP32, ESP32-S3/-C3/-C6, and nRF52 boards — wearables, beacons, time servers, Thread/CoAP meshes, data sinks, and the Hive AI prototype.
      ctaLink:
        text: see the cast
        url: /docs/hive-ai/devices/

    - title: WebXR of Things
      icon: head_mounted_device
      description: A spatial, WebXR front-end for exploring and configuring hyperlocal data and devices — the future we were promised, for the IoT around you.
      ctaLink:
        text: learn more
        url: /docs/

    - title: Open & Interoperable
      icon: extension
      description: Built to integrate with open standards and ecosystems — zeroconf/Bonjour discovery, LoRa/Meshtastic, Thread, Zigbee, and generic serialization.
      ctaLink:
        text: learn more
        url: /docs/

# imageText and imageCompare blocks are disabled until Project MagNET screenshots/illustrations exist.
imageText:
  enable: false

imageCompare:
  enable: false
